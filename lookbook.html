    'images/Vava/INTERNET_SIZE/AB__0080__-e_INTERNET_SIZE.jpg',
    'images/Vava/INTERNET_SIZE/AB__0146__-e_INTERNET_SIZE.jpg',
    'images/Vava/INTERNET_SIZE/AB__0176__-e_INTERNET_SIZE.jpg',
    'images/Vava/INTERNET_SIZE/AB__0248__-e_INTERNET_SIZE.jpg',
    'images/Vava/INTERNET_SIZE/AB__0346__-e_INTERNET_SIZE.jpg',
    'images/Vava/INTERNET_SIZE/AB__0371__-e_INTERNET_SIZE.jpg',
    'images/Vava/INTERNET_SIZE/AB__0439__-e_INTERNET_SIZE.jpg',
    'images/Vava/INTERNET_SIZE/AB__0449__-e_INTERNET_SIZE.jpg',
    'images/Vava/INTERNET_SIZE/AB__0485__-e_INTERNET_SIZE.jpg'
  ],
  glco: []
};

const PH = `<div class="ph-wrap">
  <div class="ph-icon"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#888" stroke-width="0.8"><rect x="0.5" y="0.5" width="12" height="12"/><line x1="0.5" y1="4.5" x2="12.5" y2="4.5"/><line x1="4.5" y1="0.5" x2="4.5" y2="12.5"/></svg></div>
  <span class="ph-text">Image placeholder</span>
</div>`;

function buildPages(bid, brandName, wrap) {
  const imgs = IMGS[bid] || [];
  const total = Math.max(imgs.length, 10);
  for (let i = 0; i < total; i++) {
    const pg = document.createElement('div');
    const side = (i % 2 === 0) ? 'pg-left' : 'pg-right';
    pg.className = 'lb-page ' + side;
    const inner = document.createElement('div');
    inner.className = 'lb-page-inner';
    if (imgs[i]) {
      const img = document.createElement('img');
      img.src = imgs[i]; img.alt = brandName;
      inner.appendChild(img);
    } else {
      inner.innerHTML = PH;
    }
    const wm = document.createElement('span');
    wm.className = 'lb-watermark'; wm.textContent = brandName;
    const num = document.createElement('span');
    num.className = 'lb-pagenum'; num.textContent = i + 1;
    pg.appendChild(inner); pg.appendChild(wm); pg.appendChild(num);
    wrap.appendChild(pg);
  }
}

function bookDims(wrap) {
  const totalW = wrap.offsetWidth || 800;
  const pageW = Math.floor(totalW / 2);
  const pageH = Math.floor(pageW * 1.38);
  return { pageW, pageH };
}

function getTotalPages(bid) { return Math.max((IMGS[bid]||[]).length, 10); }
function getTotalSpreads(bid) { return Math.ceil(getTotalPages(bid) / 2); }
function getPageLabel(bid, si) {
  const lp = si*2+1, rp = Math.min(lp+1, getTotalPages(bid));
  return lp === rp ? 'Page ' + lp : 'Pages ' + lp + ' – ' + rp;
}

function buildDots(bid) {
  const container = document.getElementById('dots-' + bid);
  const total = getTotalSpreads(bid);
  const dotCount = Math.min(total, 12);
  for (let i = 0; i < dotCount; i++) {
    const spreadIdx = (dotCount === total) ? i : Math.round(i * (total-1) / (dotCount-1));
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' on' : '');
    d.dataset.spread = spreadIdx;
    container.appendChild(d);
  }
}

const books = {};
const tabsInit = {};

function updateUI(bid, spreadIdx) {
  const total = getTotalSpreads(bid);
  books[bid].spread = spreadIdx;
  const dots = document.querySelectorAll('#dots-' + bid + ' .dot');
  let nearest = null, minDist = Infinity;
  dots.forEach(d => {
    const dist = Math.abs(+d.dataset.spread - spreadIdx);
    if (dist < minDist) { minDist = dist; nearest = d; }
  });
  dots.forEach(d => d.classList.remove('on'));
  if (nearest) nearest.classList.add('on');
  document.getElementById('lbl-' + bid).textContent = getPageLabel(bid, spreadIdx);
  document.getElementById('prev-' + bid).classList.toggle('off', spreadIdx === 0);
  document.getElementById('next-' + bid).classList.toggle('off', spreadIdx >= total - 1);
}

/* Web Audio flip sound */
let _ac = null;
function flipSound() {
  try {
    if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
    if (_ac.state === 'suspended') _ac.resume();
    const ctx = _ac, now = ctx.currentTime, sr = ctx.sampleRate, dur = 0.22;
    const buf = ctx.createBuffer(2, Math.floor(sr*dur), sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < d.length; i++) {
        const t = i/d.length;
        d[i] = (Math.random()*2-1) * Math.sin(Math.PI*t) * Math.exp(-t*5);
      }
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=3000; bp.Q.value=0.6;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.28, now); g.gain.exponentialRampToValueAtTime(0.001, now+dur);
    src.connect(bp); bp.connect(g); g.connect(ctx.destination); src.start(now);
  } catch(e) {}
}

function initBook(bid, brandName) {
  const wrap = document.getElementById('wrap-' + bid);
  buildPages(bid, brandName, wrap);
  buildDots(bid);
  const { pageW, pageH } = bookDims(wrap);
  const pf = new St.PageFlip(wrap, {
    width: pageW, height: pageH, size: 'stretch',
    drawShadow: true, flippingTime: 900,
    usePortrait: false, showCover: false,
    autoSize: true, maxShadowOpacity: 0.55,
    mobileScrollSupport: false, clickEventForward: false,
    swipeDistance: 30, useMouseEvents: true
  });
  pf.loadFromHTML(wrap.querySelectorAll('.lb-page'));
  pf.on('flip', e => { flipSound(); updateUI(bid, Math.floor(e.data/2)); });
  books[bid] = { pf, spread: 0 };
  document.getElementById('prev-' + bid).addEventListener('click', () => {
    if (books[bid].spread > 0) pf.flipPrev();
  });
  document.getElementById('next-' + bid).addEventListener('click', () => {
    if (books[bid].spread < getTotalSpreads(bid)-1) pf.flipNext();
  });
  document.querySelectorAll('#dots-' + bid + ' .dot').forEach(d => {
    d.addEventListener('click', () => pf.flip(+d.dataset.spread * 2));
  });
}

function activateBrand(bid) {
  document.querySelectorAll('.brand-tab').forEach(t => t.classList.toggle('active', t.dataset.brand===bid));
  document.querySelectorAll('.book-set').forEach(s => s.classList.toggle('active', s.id==='set-'+bid));
  if (!tabsInit[bid]) {
    tabsInit[bid] = true;
    const names = { mykita:'MYKITA', vava:'VAVA', glco:'Garrett Leight' };
    setTimeout(() => initBook(bid, names[bid]), 60);
  } else if (books[bid]) {
    books[bid].pf.update();
  }
}

document.querySelectorAll('.brand-tab').forEach(t => t.addEventListener('click', () => activateBrand(t.dataset.brand)));
document.addEventListener('keydown', e => {
  const bid = document.querySelector('.brand-tab.active').dataset.brand;
  if (!books[bid]) return;
  const b = books[bid];
  if (e.key==='ArrowRight' && b.spread<getTotalSpreads(bid)-1) b.pf.flipNext();
  if (e.key==='ArrowLeft'  && b.spread>0) b.pf.flipPrev();
});

activateBrand('mykita');
</script>
